<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>AI/ML Interactive Timeline</title><link rel="stylesheet" href="styles.css"><style>
body{background:#f8fbff}.timeline-shell{max-width:1180px;margin:28px auto;padding:0 16px}.timeline-hero{background:var(--surface);border:1px solid var(--line);box-shadow:var(--shadow);border-radius:28px;padding:24px;margin-bottom:18px}.timeline-grid{display:grid;grid-template-columns:1.05fr 0.95fr;gap:18px}.timeline-panel,.detail-panel{background:var(--surface);border:1px solid var(--line);box-shadow:var(--shadow);border-radius:24px;padding:22px}.timeline-line{position:relative;padding-left:24px}.timeline-line::before{content:'';position:absolute;left:8px;top:4px;bottom:4px;width:3px;background:linear-gradient(180deg,#2357d8,#9cb9ff);border-radius:999px}.milestone{position:relative;border:1px solid var(--line);background:var(--surface-2);border-radius:18px;padding:16px 16px 14px;margin-bottom:14px;cursor:pointer}.milestone.active{border-color:#b7ccff;background:#eef4ff}.milestone::before{content:'';position:absolute;left:-22px;top:22px;width:12px;height:12px;border-radius:50%;background:#2357d8;box-shadow:0 0 0 5px #edf2fc}.milestone h3{margin:0 0 6px;font-size:18px}.milestone p{margin:0;color:var(--muted)}.detail-panel img{width:100%;border-radius:18px;border:1px solid var(--line);margin-top:12px}@media(max-width:920px){.timeline-grid{grid-template-columns:1fr}}</style></head>
<body><div class="timeline-shell"><section class="timeline-hero"><p class="eyebrow">Interactive Artifact</p><h1 style="font-size:40px;margin:0 0 10px">AI and ML Timeline</h1><p class="lead" style="margin-bottom:0;max-width:900px">Click a milestone to view a short explanation of why it matters in the historical development of artificial intelligence and machine learning.</p></section><div class="timeline-grid"><section class="timeline-panel"><div class="timeline-line" id="timelineList"></div></section><aside class="detail-panel"><p class="card-label">Selected Milestone</p><h2 id="detailTitle" style="margin-top:0"></h2><p class="small-note" id="detailYear"></p><p id="detailText"></p><div class="callout" id="detailWhy"></div><img src="assets/ai_ml_timeline.png" alt="AI and ML timeline poster"></aside></div></div><script>
const data=[
{year:'1950',title:'Turing and Early Machine Intelligence',short:'Alan Turing proposed the Turing Test and helped frame the central question of machine intelligence.',why:'This milestone matters because it gave the field one of its earliest intellectual foundations.'},
{year:'1956',title:'Dartmouth Conference',short:'The Dartmouth workshop is widely recognized as the formal birth of AI as a field.',why:'It established AI as a serious academic area of inquiry.'},
{year:'1960s',title:'Symbolic AI',short:'Early AI emphasized rules, logic, and symbolic reasoning.',why:'This phase shaped the first generation of AI systems and set expectations for machine reasoning.'},
{year:'1974–1980',title:'First AI Winter',short:'Funding and optimism declined when early systems failed to meet inflated expectations.',why:'It showed that progress in AI depends on both ideas and practical capability.'},
{year:'1980s',title:'Expert Systems',short:'Rule-based systems found practical business uses in narrow domains.',why:'AI briefly moved into real organizational settings through structured expert knowledge.'},
{year:'1987–1993',title:'Second AI Winter',short:'Interest fell again as expert systems became difficult to scale and maintain.',why:'This period reinforced the gap between hype and sustainable deployment.'},
{year:'1997',title:'Deep Blue',short:'IBM’s Deep Blue defeated world chess champion Garry Kasparov.',why:'It showed that AI could outperform humans in highly specialized tasks.'},
{year:'2000s–2012',title:'Machine Learning and AlexNet',short:'The field shifted toward data-driven learning, culminating in AlexNet’s 2012 breakthrough.',why:'This transition launched the modern deep learning era.'},
{year:'2016',title:'AlphaGo',short:'DeepMind’s AlphaGo defeated Lee Sedol in Go.',why:'It demonstrated the power of deep learning and reinforcement learning at a global scale.'},
{year:'2020s',title:'Generative AI Era',short:'Large language models and generative systems became part of everyday digital life.',why:'AI expanded from prediction into text, image, and code generation for mass use.'}
];
const list=document.getElementById('timelineList');
function render(selected=0){list.innerHTML='';data.forEach((m,i)=>{const el=document.createElement('div');el.className='milestone'+(i===selected?' active':'');el.innerHTML=`<div class="card-label">${m.year}</div><h3>${m.title}</h3><p>${m.short}</p>`;el.onclick=()=>render(i);list.appendChild(el);});const m=data[selected];detailTitle.textContent=m.title;detailYear.textContent=m.year;detailText.textContent=m.short;detailWhy.textContent=m.why;} render();
</script></body></html>
